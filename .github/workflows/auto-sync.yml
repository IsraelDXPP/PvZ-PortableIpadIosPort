name: Auto Sync from Upstream

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/wszqkzqk/PvZ-Portable.git

      - name: Fetch upstream
        run: git fetch upstream main --tags

      - name: Rebase on upstream
        run: |
          # Try to rebase our custom commits on top of the latest upstream main
          git rebase upstream/main
          
      - name: Push changes
        run: git push origin main --force-with-lease
